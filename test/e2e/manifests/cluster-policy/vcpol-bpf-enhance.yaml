apiVersion: crd.varmor.org/v1beta1
kind: VarmorClusterPolicy
metadata:
  # Cluster-scoped policies are not namespaced.
  name: demo-cluster-policy
spec:
  # Perform a rolling update on existing workloads.
  # It's disabled by default.
  updateExistingWorkloads: true
  target:
    # The policy protects all the containers by default if the .spec.target.containers is nil.
    kind: Deployment
    selector:
      matchLabels:
        app: demo-cluster-policy
  policy:
    enforcer: BPF
    mode: EnhanceProtect
    enhanceProtect:
      # Audit the actions that violate the mandatory access control rules.
      # Any detected violation will be logged to /var/log/varmor/violations.log file in the host.
      # It's disabled by default.
      auditViolations: true
      attackProtectionRules:
      - rules:
        # Prohibit the container from reading the ServiceAccount token, so that
        # the verification command below is expected to be blocked.
        - mitigate-sa-leak
