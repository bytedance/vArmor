apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-cluster-policy
  namespace: demo
  labels:
    app: demo-cluster-policy
    # This label is required with target workloads.
    # You can disable the feature with --set 'manager.args={--webhookMatchLabel=}'
    sandbox.varmor.org/enable: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-cluster-policy
  template:
    metadata:
      labels:
        app: demo-cluster-policy
      annotations:
        # Explicitly disable the BPF protection for the container named c0 so
        # that only c1 is enforced by the cluster-scoped policy.
        container.bpf.security.beta.varmor.org/c0: unconfined
    spec:
      containers:
      - name: c0
        image: debian:10
        command: ["/bin/sh", "-c", "sleep infinity"]
        imagePullPolicy: IfNotPresent
      - name: c1
        image: debian:10
        command: ["/bin/sh", "-c", "sleep infinity"]
        imagePullPolicy: IfNotPresent
