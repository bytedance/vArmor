# E2E fixture: workload for the MITM header-injection test.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-networkproxy-mitm-audit
  namespace: demo
  labels:
    environment: production
    app: e2e-networkproxy-mitm-audit
    sandbox.varmor.org/enable: "true"
spec:
