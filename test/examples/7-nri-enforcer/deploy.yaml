apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-7
  namespace: demo
  labels:
    app: demo-7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-7
  template:
    metadata:
      labels:
        app: demo-7
    spec:
      containers:
      - name: demo-container
        image: busybox:latest
        command: ["sh", "-c", "sleep 3600"]
