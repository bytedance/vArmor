apiVersion: crd.varmor.org/v1beta1
kind: VarmorClusterPolicy
metadata:
  name: demo-7-raw
spec:
  target:
    kind: Pod
  policy:
    enforcer: NRI
    mode: EnhanceProtect
    enhanceProtect:
      auditViolations: true
      nriOptions:
        # Defines the action to take when policy evaluation fails or an error occurs.
        # "Audit": log the error and allow the action (default)
        # "Fail": log the error and block the action
        # "Ignore": allow the action and do not log the error
        failurePolicy: Audit
        # Specifies the maximum time in milliseconds for policy evaluation.
        # If timeout is exceeded, the failurePolicy will be applied.
        timeout: 2000
      nriRawRules: |
        package nri.authz

        deny[msg] {
            startswith(input.container.name, "demo-")
            msg := sprintf("Container name '%v' starts with 'demo-' which is forbidden", [input.container.name])
        }
