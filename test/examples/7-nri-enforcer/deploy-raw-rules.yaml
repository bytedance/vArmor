apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-7-raw
  namespace: demo
  labels:
    app: demo-7-raw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-7-raw
  template:
    metadata:
      labels:
        app: demo-7-raw
    spec:
      containers:
      - name: demo-container
        image: busybox:latest
        command: ["sh", "-c", "sleep 3600"]
