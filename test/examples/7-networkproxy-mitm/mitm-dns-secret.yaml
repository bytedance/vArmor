# Scenario: Single domain + SecretRef API Key injection
#
# - domains = [httpbin.org] (using httpbin.org instead of api.openai.com for easier manual testing)
# - Injects the "Authorization" header with the value from Secret "openai-credentials" key "api-key"
# - Verification points:
#     * When the container makes an HTTPS request to httpbin.org, the sidecar terminates TLS and
#       automatically attaches the Authorization header (from the Secret), then re-encrypts and sends to upstream
#     * The container does not need to hold the API Key in plaintext
#     * The Authorization header should be visible in the httpbin.org/headers response
#
# Verification:
#   kubectl exec -it -n demo deploy/mitm-dns-secret -- curl -sSL https://httpbin.org/headers
#   # Expected: 200, see Authorization=Bearer sk-test-DO-NOT-USE
#
# Note: The Secret must be in the same namespace as the Deployment. The Controller reads
# the Secret value during reconcile and inlines it into the xDS configuration.
# If the user wants to rotate the injected key, the current behavior requires creating
# a new Secret and then updating the Policy `secretRef.name` to point to the new Secret.
# In-place updates to the referenced Secret data are not automatically propagated to the sidecar yet.
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-credentials
  namespace: demo
type: Opaque
stringData:
  # Replace with "Bearer sk-xxx" for real usage. This value is only for manual verification of the injection pipeline.
  api-key: "Bearer sk-test-DO-NOT-USE"
---
apiVersion: crd.varmor.org/v1beta1
kind: VarmorPolicy
metadata:
  name: mitm-dns-secret
  namespace: demo
spec:
  updateExistingWorkloads: true
  target:
    kind: Deployment
    selector:
      matchLabels:
        app: mitm-dns-secret
  policy:
    enforcer: NetworkProxy
    mode: EnhanceProtect
    networkProxyConfig:
      mitm:
        domains:
          - httpbin.org
        headerMutations:
          - domain: httpbin.org
            headers:
              - name: Authorization
                secretRef:
                  name: openai-credentials
                  key: api-key
    enhanceProtect:
      networkProxyRawRules:
        egress:
          defaultAction: deny
          httpRules:
            - qualifiers: ["allow", "audit"]
              match:
                hosts:
                  - httpbin.org
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitm-dns-secret
  namespace: demo
  labels:
    environment: production
    app: mitm-dns-secret
    sandbox.varmor.org/enable: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mitm-dns-secret
  template:
    metadata:
      labels:
        app: mitm-dns-secret
    spec:
      containers:
        - name: c0
          image: elkeid-test-cn-beijing.cr.volces.com/public/curl:8.7.1
          command: ["/bin/sh", "-c", "sleep infinity"]
          imagePullPolicy: IfNotPresent
