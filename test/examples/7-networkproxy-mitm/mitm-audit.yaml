# Scenario: MITM + audit mode (allow-default)
#
# - defaultAction = allow (denylist mode)
# - Enable MITM for httpbin.org and inject debug headers
# - All requests to httpbin.org will trigger access_log (qualifiers include audit)
# - Purpose: log only without blocking; observe whether the MITM chain correctly decrypts / injects / forwards upstream
#
# Access Log technical details:
#   - In allow-default mode, rules with the "audit" qualifier generate shadow RBAC
#   - Shadow RBAC does not block; it only writes shadow_effective_policy_id into filter_metadata
#   - access_log uses a separate shadow CEL expression (not combined with deny CEL via ||):
#       'shadow_effective_policy_id' in metadata.filter_metadata['envoy.filters.http.rbac']
#   - %FILTER_CHAIN_NAME% in the format string identifies the log source (mitm_tls_dns_chain vs http_chain, etc.)
#
# Verification:
#   kubectl exec -it -n demo deploy/mitm-audit -- curl -sSL https://httpbin.org/headers
#   Check proxy sidecar stdout / access_log:
#     - A hit record in the format [L7][mitm_tls_dns_chain] should appear
#     - The request is not blocked (allow-default), but the audit log is printed
---
apiVersion: crd.varmor.org/v1beta1
kind: VarmorPolicy
metadata:
  name: mitm-audit
  namespace: demo
spec:
  updateExistingWorkloads: true
  target:
    kind: Deployment
    selector:
      matchLabels:
        app: mitm-audit
  policy:
    enforcer: NetworkProxy
    mode: EnhanceProtect
    networkProxyConfig:
      mitm:
        domains:
          - httpbin.org
        headerMutations:
          - domain: httpbin.org
            headers:
              - name: X-Request-Source
                value: varmor-audit
    enhanceProtect:
      networkProxyRawRules:
        egress:
          defaultAction: allow
          httpRules:
            - qualifiers: ["allow", "audit"]
              description: "audit every request to httpbin.org"
              match:
                hosts:
                  - httpbin.org
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitm-audit
  namespace: demo
  labels:
    environment: production
    app: mitm-audit
    sandbox.varmor.org/enable: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mitm-audit
  template:
    metadata:
      labels:
        app: mitm-audit
    spec:
      containers:
        - name: c0
          image: elkeid-test-cn-beijing.cr.volces.com/public/curl:8.7.1
          command: ["/bin/sh", "-c", "sleep infinity"]
          imagePullPolicy: IfNotPresent
